<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VetOnlineCRM — Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 28px;
            color: #4A90D9;
        }
        .logo p {
            color: #888;
            margin-top: 5px;
            font-size: 14px;
        }
        .logo .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #888;
            font-weight: 600;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        .tab.active {
            color: #4A90D9;
            border-bottom-color: #4A90D9;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #555;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #4A90D9;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4A90D9, #667eea);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(74,144,217,0.4);
        }
        .error {
            background: #ffe0e0;
            color: #d32f2f;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }
        .success {
            background: #e0f7e0;
            color: #2e7d32;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }
        #registerForm { display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="icon">🐾</div>
            <h1>VetOnlineCRM</h1>
            <p>Система для ветеринарных онлайн-консультаций</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="showTab('login')">Вход</div>
            <div class="tab" onclick="showTab('register')">Регистрация</div>
        </div>

        <div id="errorMsg" class="error"></div>
        <div id="successMsg" class="success"></div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Логин или Email</label>
                <input type="text" id="loginUsername" placeholder="Введите логин" required>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="loginPassword" placeholder="Введите пароль" required>
            </div>
            <button type="submit" class="btn">Войти</button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>ФИО *</label>
                <input type="text" id="regFullName" placeholder="Иванов Иван Иванович" required>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="regEmail" placeholder="doctor@email.com" required>
            </div>
            <div class="form-group">
                <label>Логин *</label>
                <input type="text" id="regUsername" placeholder="doctor1" required>
            </div>
            <div class="form-group">
                <label>Пароль *</label>
                <input type="password" id="regPassword" placeholder="Минимум 6 символов" required>
            </div>
            <div class="form-group">
                <label>Телефон</label>
                <input type="text" id="regPhone" placeholder="+7 999 123 4567">
            </div>
            <div class="form-group">
                <label>Специализация</label>
                <input type="text" id="regSpec" placeholder="Терапевт, дерматолог...">
            </div>
            <button type="submit" class="btn">Зарегистрироваться</button>
        </form>
    </div>

    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';

            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            }
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }

        async function handleLogin(e) {
            e.preventDefault();
            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: document.getElementById('loginUsername').value,
                        password: document.getElementById('loginPassword').value
                    })
                });
                const data = await resp.json();
                if (resp.ok) {
                    window.location.href = '/';
                } else {
                    showError(data.detail || 'Ошибка входа');
                }
            } catch(err) {
                showError('Ошибка соединения');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const password = document.getElementById('regPassword').value;
            if (password.length < 6) {
                showError('Пароль минимум 6 символов');
                return;
            }
            try {
                const resp = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        full_name: document.getElementById('regFullName').value,
                        email: document.getElementById('regEmail').value,
                        username: document.getElementById('regUsername').value,
                        password: password,
                        phone: document.getElementById('regPhone').value,
                        specialization: document.getElementById('regSpec').value
                    })
                });
                const data = await resp.json();
                if (resp.ok) {
                    window.location.href = '/';
                } else {
                    showError(data.detail || 'Ошибка регистрации');
                }
            } catch(err) {
                showError('Ошибка соединения');
            }
        }
    </script>
</body>
</html>
