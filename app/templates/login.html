<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VetOnlineCRM — Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-size: 28px; color: #4A90D9; }
        .logo p { color: #888; margin-top: 5px; font-size: 14px; }
        .logo .icon { font-size: 48px; margin-bottom: 10px; }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block; margin-bottom: 6px;
            font-weight: 500; color: #555; font-size: 14px;
        }
        .form-group input {
            width: 100%; padding: 12px 15px;
            border: 2px solid #e0e0e0; border-radius: 10px;
            font-size: 15px; outline: none; transition: border-color 0.3s;
        }
        .form-group input:focus { border-color: #4A90D9; }
        .btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #4A90D9, #667eea);
            color: white; border: none; border-radius: 10px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(74,144,217,0.4);
        }
        .error {
            background: #ffe0e0; color: #d32f2f;
            padding: 10px 15px; border-radius: 8px;
            margin-bottom: 15px; font-size: 14px; display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="icon">🐾</div>
            <h1>VetOnlineCRM</h1>
            <p>Система для ветеринарных онлайн-консультаций</p>
        </div>

        <div id="errorMsg" class="error"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Логин</label>
                <input type="text" id="loginUsername" placeholder="Введите логин" required>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="loginPassword" placeholder="Введите пароль" required>
            </div>
            <button type="submit" class="btn">Войти</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const errorEl = document.getElementById('errorMsg');
            errorEl.style.display = 'none';

            const formData = new FormData();
            formData.append('username', document.getElementById('loginUsername').value);
            formData.append('password', document.getElementById('loginPassword').value);

            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    body: formData,
                    redirect: 'follow'
                });

                if (resp.redirected) {
                    window.location.href = resp.url;
                } else if (resp.ok) {
                    window.location.href = '/';
                } else {
                    const data = await resp.json();
                    errorEl.textContent = data.detail || 'Ошибка входа';
                    errorEl.style.display = 'block';
                }
            } catch(err) {
                errorEl.textContent = 'Ошибка соединения';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
